<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fdf6f0"/>
      <stop offset="100%" stop-color="#f5e6d8"/>
    </radialGradient>
    <radialGradient id="self-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1a3a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <radialGradient id="g-strong" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </radialGradient>
    <radialGradient id="g-pleasure" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#86efac"/>
    </radialGradient>
    <radialGradient id="g-controller" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </radialGradient>
    <radialGradient id="g-intermediate" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </radialGradient>
    <radialGradient id="g-regulator" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- 5 segments -->
  <path d="M 90 90 L 90 22 A 68 68 0 0 1 155.6 60.8 Z" fill="url(#g-pleasure)" opacity="0.9"/>
  <path d="M 90 90 L 155.6 60.8 A 68 68 0 0 1 150.8 131.6 Z" fill="url(#g-strong)" opacity="0.9"/>
  <path d="M 90 90 L 150.8 131.6 A 68 68 0 0 1 90 158 Z" fill="url(#g-controller)" opacity="0.9"/>
  <path d="M 90 90 L 90 158 A 68 68 0 0 1 29.2 131.6 Z" fill="url(#g-intermediate)" opacity="0.9"/>
  <path d="M 90 90 L 29.2 131.6 A 68 68 0 0 1 53.4 34 Z" fill="url(#g-regulator)" opacity="0.9"/>
  <path d="M 90 90 L 53.4 34 A 68 68 0 0 1 90 22 Z" fill="url(#g-regulator)" opacity="0.9"/>

  <!-- Внешний золотой круг -->
  <circle cx="90" cy="90" r="28" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>

  <!-- Симметричные 8 лепестков -->
  <g opacity="0.5" fill="none" stroke="url(#gold)" stroke-width="0.8">
    <path d="M 90 68 Q 100 80 90 90 Q 80 80 90 68 Z"/>
    <path d="M 90 112 Q 80 100 90 90 Q 100 100 90 112 Z"/>
    <path d="M 68 90 Q 80 80 90 90 Q 80 100 68 90 Z"/>
    <path d="M 112 90 Q 100 100 90 90 Q 100 80 112 90 Z"/>
    <path d="M 74.4 74.4 Q 90 80 90 90 Q 80 90 74.4 74.4 Z"/>
    <path d="M 105.6 74.4 Q 100 90 90 90 Q 90 80 105.6 74.4 Z"/>
    <path d="M 105.6 105.6 Q 90 100 90 90 Q 100 90 105.6 105.6 Z"/>
    <path d="M 74.4 105.6 Q 80 90 90 90 Q 90 100 74.4 105.6 Z"/>
  </g>

  <!-- Концентрические окружности -->
  <circle cx="90" cy="90" r="22" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.5"/>
  <circle cx="90" cy="90" r="16" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.6" stroke-dasharray="1 1"/>

  <!-- 8 точек-звёзд -->
  <g fill="url(#gold)" opacity="0.75">
    <circle cx="90" cy="68" r="1.2"/>
    <circle cx="105.6" cy="74.4" r="1.2"/>
    <circle cx="112" cy="90" r="1.2"/>
    <circle cx="105.6" cy="105.6" r="1.2"/>
    <circle cx="90" cy="112" r="1.2"/>
    <circle cx="74.4" cy="105.6" r="1.2"/>
    <circle cx="68" cy="90" r="1.2"/>
    <circle cx="74.4" cy="74.4" r="1.2"/>
  </g>

  <!-- Звезда Давида -->
  <g opacity="0.3" fill="none" stroke="url(#gold)" stroke-width="0.5">
    <polygon points="90,72 102.4,94 77.6,94"/>
    <polygon points="90,108 77.6,86 102.4,86"/>
  </g>

  <!-- Центральное «Я» -->
  <circle cx="90" cy="90" r="22" fill="url(#self-grad)"/>
  <text x="90" y="90" text-anchor="middle" dominant-baseline="central" font-family="serif" font-size="26" font-weight="700" fill="white">Я</text>

  <!-- Внешний декоративный круг -->
  <circle cx="90" cy="90" r="82" fill="none" stroke="#ca8a04" stroke-width="1" opacity="0.35" stroke-dasharray="2 4"/>
</svg>
